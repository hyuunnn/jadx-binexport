<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#56d364"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <!-- squircle tile -->
  <rect x="20" y="20" width="472" height="472" rx="116" fill="url(#tile)" stroke="url(#ring)" stroke-width="8"/>

  <!-- two versions: left column (v1) and right column (v2), matched by edges -->
  <!-- match edges -->
  <g stroke-width="14" fill="none" stroke-linecap="round">
    <path d="M186,168 L326,168" stroke="#3fb950"/>
    <path d="M186,256 L326,256" stroke="#3fb950"/>
    <path d="M186,344 L326,344" stroke="#f85149"/>
  </g>

  <!-- nodes -->
  <g>
    <!-- left v1 -->
    <circle cx="186" cy="168" r="34" fill="#0d1117" stroke="#58a6ff" stroke-width="12"/>
    <circle cx="186" cy="256" r="34" fill="#0d1117" stroke="#58a6ff" stroke-width="12"/>
    <circle cx="186" cy="344" r="34" fill="#0d1117" stroke="#58a6ff" stroke-width="12"/>
    <!-- right v2 -->
    <circle cx="326" cy="168" r="34" fill="#0d1117" stroke="#3fb950" stroke-width="12"/>
    <circle cx="326" cy="256" r="34" fill="#0d1117" stroke="#3fb950" stroke-width="12"/>
    <circle cx="326" cy="344" r="34" fill="#0d1117" stroke="#f85149" stroke-width="12"/>
  </g>
</svg>
