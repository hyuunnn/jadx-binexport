<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#56d364"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6e7681"/>
    </marker>
  </defs>

  <rect width="1200" height="540" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="539" rx="16" fill="none" stroke="#30363d"/>

  <!-- Title + tagline -->
  <text x="56" y="82" font-size="46" font-weight="800" fill="url(#title)">jadx-binexport</text>
  <text x="58" y="120" font-size="20" fill="#c9d1d9">Diff two APK versions in BinDiff — structural, obfuscation-resistant,</text>
  <text x="58" y="148" font-size="20" fill="#8b949e">with click-to-navigate straight back to the method's Java in jadx.</text>

  <!-- ===== Left: pipeline ===== -->
  <!-- two app inputs -->
  <g>
    <rect x="56" y="212" width="150" height="46" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="131" y="240" font-size="16" fill="#e6edf3" text-anchor="middle">app-v1.apk</text>
    <rect x="224" y="212" width="150" height="46" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="299" y="240" font-size="16" fill="#e6edf3" text-anchor="middle">app-v2.apk</text>
  </g>

  <!-- converging arrows to jadx box -->
  <path d="M131,258 L175,300" fill="none" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M299,258 L255,300" fill="none" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- jadx + plugin -->
  <rect x="56" y="306" width="318" height="54" rx="8" fill="#132132" stroke="#58a6ff"/>
  <text x="215" y="333" font-size="17" font-weight="700" fill="#e6edf3" text-anchor="middle">jadx  +  jadx-binexport plugin</text>
  <text x="215" y="352" font-size="13" fill="#8b949e" text-anchor="middle">exports each app → .BinExport (BinExport2 protobuf)</text>

  <path d="M215,360 L215,398" fill="none" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- BinDiff -->
  <rect x="56" y="404" width="318" height="54" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="215" y="431" font-size="17" font-weight="700" fill="#e6edf3" text-anchor="middle">BinDiff</text>
  <text x="215" y="450" font-size="13" fill="#8b949e" text-anchor="middle">structural match: call graph + CFG + raw_bytes hashes</text>

  <!-- arrow to results -->
  <path d="M374,431 C470,431 500,300 588,300" fill="none" stroke="#6e7681" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Right: results table card ===== -->
  <g>
    <rect x="596" y="150" width="556" height="330" rx="12" fill="#0d1117" stroke="#30363d"/>
    <!-- header -->
    <text x="620" y="184" font-size="17" font-weight="700" fill="#e6edf3">Matched functions</text>
    <text x="620" y="206" font-size="13" fill="#8b949e">sorted by similarity — changed first · double-click → open in jadx</text>
    <line x1="596" y1="222" x2="1152" y2="222" stroke="#30363d"/>
    <!-- column labels -->
    <text x="620" y="248" font-size="12" font-weight="600" fill="#6e7681">FUNCTION</text>
    <text x="980" y="248" font-size="12" font-weight="600" fill="#6e7681">SIMILARITY</text>

    <!-- rows: name, bar (width ~ value*130), value, color by value -->
    <!-- decrypt: changed (red) -->
    <rect x="612" y="262" width="528" height="34" rx="6" fill="#161b22"/>
    <text x="628" y="284" font-size="15" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">Crypto.decrypt(int)</text>
    <rect x="980" y="272" width="55" height="14" rx="7" fill="#f85149"/>
    <text x="1120" y="284" font-size="14" fill="#f85149" text-anchor="end" font-weight="700">0.42</text>

    <!-- net -->
    <text x="628" y="322" font-size="15" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">Net.net(int)</text>
    <rect x="980" y="311" width="118" height="14" rx="7" fill="#3fb950"/>
    <text x="1120" y="322" font-size="14" fill="#56d364" text-anchor="end" font-weight="700">0.91</text>

    <!-- parse -->
    <text x="628" y="358" font-size="15" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">Store.parse(int)</text>
    <rect x="980" y="347" width="124" height="14" rx="7" fill="#3fb950"/>
    <text x="1120" y="358" font-size="14" fill="#56d364" text-anchor="end" font-weight="700">0.95</text>

    <!-- login -->
    <text x="628" y="394" font-size="15" fill="#e6edf3" font-family="ui-monospace, Menlo, Consolas, monospace">Auth.login(int)</text>
    <rect x="980" y="383" width="128" height="14" rx="7" fill="#3fb950"/>
    <text x="1120" y="394" font-size="14" fill="#56d364" text-anchor="end" font-weight="700">0.98</text>

    <!-- new in v2 -->
    <text x="628" y="430" font-size="15" fill="#8b949e" font-family="ui-monospace, Menlo, Consolas, monospace">NewFeature.cache(int)</text>
    <text x="1120" y="430" font-size="13" fill="#6e7681" text-anchor="end">new in v2</text>

    <!-- footer hint -->
    <line x1="596" y1="446" x2="1152" y2="446" stroke="#30363d"/>
    <text x="620" y="468" font-size="13" fill="#8b949e">↩  double-click a row  →  jumps to that method's decompiled Java in jadx-gui</text>
  </g>

  <!-- obfuscation note chip -->
  <rect x="56" y="486" width="318" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
  <text x="215" y="506" font-size="13" fill="#8b949e" text-anchor="middle">works even when ProGuard/R8 renames every symbol</text>
</svg>
